# CI/CD fuer app-release (GitLab Free)
# Diese Datei muss im Repo app-release als .gitlab-ci.yml abgelegt werden
# (umbenennen beim ersten Push oder per gitlab-ci include aus dieser Datei).
#
# Pipeline: validate_release -> deploy_alpha | deploy_beta | deploy_prod
#
# Erwartete CI/CD Variables (Settings -> CI/CD -> Variables, alle Protected):
#   COOLIFY_WEBHOOK_ALPHA        Coolify Deploy-Webhook fuer alpha-Stack
#   COOLIFY_WEBHOOK_BETA         Coolify Deploy-Webhook fuer beta-Stack
#   COOLIFY_WEBHOOK_LIVE         Coolify Deploy-Webhook fuer live-Stack
# Optional (Tests gegen echte Umgebung):
#   E2E_BASE_URL_ALPHA

default:
  image: node:20-alpine
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - .npm/
  before_script:
    - apk add --no-cache git bash

stages:
  - validate_release
  - deploy_alpha
  - deploy_beta
  - deploy_prod

variables:
  NEXT_TELEMETRY_DISABLED: "1"
  npm_config_cache: ".npm"

validate_release:
  stage: validate_release
  script:
    - npm ci --no-audit --no-fund
    - npm run lint
    - npm test
    - npm run build
  artifacts:
    paths:
      - .next/
    expire_in: 1 day
  rules:
    - if: $CI_COMMIT_BRANCH =~ /^release\//
    - if: $CI_COMMIT_BRANCH == "alpha"
    - if: $CI_COMMIT_BRANCH == "beta"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

deploy_alpha:
  stage: deploy_alpha
  image: alpine:3.20
  needs: [validate_release]
  before_script:
    - apk add --no-cache curl
  script:
    - 'curl -fsSL -X POST "$COOLIFY_WEBHOOK_ALPHA"'
  environment:
    name: alpha
    url: https://alpha.deine-domain
  rules:
    - if: $CI_COMMIT_BRANCH == "alpha"

deploy_beta:
  stage: deploy_beta
  image: alpine:3.20
  needs: [validate_release]
  before_script:
    - apk add --no-cache curl
  script:
    - 'curl -fsSL -X POST "$COOLIFY_WEBHOOK_BETA"'
  environment:
    name: beta
    url: https://beta.deine-domain
  rules:
    - if: $CI_COMMIT_BRANCH == "beta"

deploy_prod:
  stage: deploy_prod
  image: alpine:3.20
  needs: [validate_release]
  before_script:
    - apk add --no-cache curl
  script:
    - 'curl -fsSL -X POST "$COOLIFY_WEBHOOK_LIVE"'
  environment:
    name: production
    url: https://deine-domain
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
