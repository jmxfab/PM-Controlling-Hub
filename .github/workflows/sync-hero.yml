name: Hero → Supabase Sync

on:
  schedule:
    # Regelmäßiger Sync alle 30 Minuten.
    - cron: "*/30 * * * *"
    # Zusätzlicher Sync Donnerstag 09:40 Europe/Berlin — direkt vor
    # dem Ende der Jumax-Wochenperiode (Fr→Do). GitHub-Cron läuft in UTC,
    # daher zwei Einträge für Sommer- (CEST = UTC+2) und Winterzeit
    # (CET = UTC+1). Dedup ist unkritisch: Sync ist idempotent, die
    # View wird nach jedem Run sowieso refresht.
    - cron: "40 7 * * 4"   # Do 09:40 CEST (Apr–Okt, Sommerzeit)
    - cron: "40 8 * * 4"   # Do 09:40 CET  (Okt–Mär, Winterzeit)
  workflow_dispatch:
    inputs:
      entities:
        description: 'Comma-separated entity names or "all"'
        required: false
        default: "all"

concurrency:
  group: hero-sync
  cancel-in-progress: false

jobs:
  sync:
    name: Run Hero sync
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run sync
        run: >-
          npx tsx scripts/sync/run-all.ts --entities
          "${{ github.event.inputs.entities || 'projects,contacts,customer_documents,tasks,calendar_events,field_service_jobs,file_uploads,receipts,tracking_times,absences,histories' }}"
        env:
          HERO_API_KEY: ${{ secrets.HERO_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GITHUB_RUN_ID: ${{ github.run_id }}
