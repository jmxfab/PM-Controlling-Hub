name: Hero → Supabase Master Data Sync

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

concurrency:
  group: hero-sync-master-data
  cancel-in-progress: false

jobs:
  sync:
    name: Sync Hero master data (stable reference tables)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run master-data sync
        run: >-
          npx tsx scripts/sync/run-all.ts --entities
          "measures,partners,project_types,document_types,tracking_categories,company_branches,company"
        env:
          HERO_API_KEY: ${{ secrets.HERO_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GITHUB_RUN_ID: ${{ github.run_id }}
